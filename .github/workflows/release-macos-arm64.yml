name: Release macOS Apple Silicon

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-macos-arm64-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    name: Build and publish notarized macOS Apple Silicon release
    runs-on: macos-14

    env:
      HUSKY: 0
      MACOS_NOTARIZATION_ARTIFACT_DIR: dist/notarization

    steps:
      - name: Check out pushed tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify Apple Silicon runner
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          echo "GitHub Actions runner architecture: ${arch}"
          if [ "${arch}" != "arm64" ]; then
            echo "::error::This workflow must run on an Apple Silicon macOS runner. The selected runner reported '${arch}'."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root tooling dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Validate tag and Maven version
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${tag}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'; then
            echo "::error::Release tags must use semantic version format such as v0.1.0 or v0.1.0-beta.1."
            exit 1
          fi

          release_version="${tag#v}"
          base_version="${release_version%%-*}"
          maven_version="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"

          if [ "${maven_version}" != "${release_version}" ] \
            && [ "${maven_version}" != "${release_version}-SNAPSHOT" ] \
            && [ "${maven_version}" != "${base_version}-SNAPSHOT" ]; then
            echo "::error::Maven project version is not compatible with release tag."
            exit 1
          fi

          prerelease=false
          if printf '%s\n' "${release_version}" | grep -q -- '-'; then
            prerelease=true
          fi

          {
            echo "release_version=${release_version}"
            echo "release_asset_name=Memoria-Vault-${release_version}-macos-arm64.dmg"
            echo "release_dmg=dist/installers/Memoria-Vault-${release_version}-macos-arm64.dmg"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run quality checks
        run: make verify

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="${RUNNER_TEMP}/memoria-vault-signing.keychain-db"
          cert_path="${RUNNER_TEMP}/developer-id-application.p12"
          keychain_password="$(uuidgen)"

          printf '%s' "${APPLE_CERTIFICATE_P12_BASE64}" | base64 --decode > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${cert_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}" >/dev/null

          {
            echo "APPLE_CODESIGN_KEYCHAIN=${keychain_path}"
            echo "APPLE_KEYCHAIN_PATH=${keychain_path}"
            echo "APPLE_CERTIFICATE_PATH=${cert_path}"
          } >> "${GITHUB_ENV}"

      - name: Build production JAR
        run: make build-production

      - name: Build unsigned macOS app
        run: make package-macos-app

      - name: Sign embedded code
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: make sign-macos-app

      - name: Verify app signatures
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          mkdir -p "${MACOS_NOTARIZATION_ARTIFACT_DIR}"
          make verify-macos-signatures | tee "${MACOS_NOTARIZATION_ARTIFACT_DIR}/signature-verification-summary.txt"

      - name: Create signed DMG
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make package-macos-dmg-from-signed-app

      - name: Sign DMG
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: |
          set -euo pipefail
          make sign-macos-dmg
          mkdir -p "${MACOS_NOTARIZATION_ARTIFACT_DIR}"
          codesign --verify --strict --verbose=2 "${MACOS_DMG_PATH}" >/dev/null
          printf '%s\n' "DMG signature: signed-valid" > "${MACOS_NOTARIZATION_ARTIFACT_DIR}/dmg-signature-verification.txt"

      - name: Notarize macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make notarize-macos-dmg

      - name: Staple notarization ticket
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make staple-macos-dmg

      - name: Verify notarized release artifact
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make verify-macos-notarization

      - name: Generate checksum
        env:
          MACOS_DMG_PATH: ${{ steps.version.outputs.release_dmg }}
        run: make checksum-macos-dmg

      - name: Write release notes introduction
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.release_version }}"
          cat > release-notes-intro.md <<EOF
          ## Memoria Vault for macOS Apple Silicon

          Memoria Vault runs locally on your Mac. Your compatible exported memories are not uploaded to a cloud service.

          This application is an independent, open-source local tool and is not affiliated, associated, authorized, endorsed by, or in any way officially connected with Snap Inc. or Snapchat.

          ### Installation

          1. Download \`Memoria-Vault-${version}-macos-arm64.dmg\`.
          2. Open the DMG.
          3. Drag Memoria Vault to Applications.
          4. Open Memoria Vault.
          5. Choose your exported archive folder and start a local scan.

          ### Requirements

          - macOS on Apple Silicon
          - A compatible exported memories archive folder

          ### Release integrity

          - The DMG is signed with Developer ID, notarized by Apple, stapled, and verified before publication.
          - The SHA-256 checksum is generated after stapling.

          EOF

      - name: Publish GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          RELEASE_DMG: ${{ steps.version.outputs.release_dmg }}
        run: |
          set -euo pipefail
          checksum="${RELEASE_DMG}.sha256"
          test -f "${RELEASE_DMG}"
          test -f "${checksum}"

          prerelease_flag=""
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${RELEASE_DMG}" "${checksum}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${RELEASE_DMG}" \
              "${checksum}" \
              --title "Memoria Vault ${GITHUB_REF_NAME}" \
              --notes-file release-notes-intro.md \
              --generate-notes \
              ${prerelease_flag}
          fi

      - name: Upload notarization diagnostics
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: memoria-vault-macos-notarization-${{ github.ref_name }}
          path: |
            dist/notarization/
          if-no-files-found: ignore
          retention-days: 14

      - name: Clean up signing materials
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${APPLE_CERTIFICATE_PATH:-}" ] && [ -f "${APPLE_CERTIFICATE_PATH}" ]; then
            rm -f "${APPLE_CERTIFICATE_PATH}"
          fi
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ] && [ -f "${APPLE_KEYCHAIN_PATH}" ]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi
