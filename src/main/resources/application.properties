spring.application.name=memoria-vault
spring.main.headless=false

server.address=127.0.0.1
server.port=8080

spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate=ERROR
logging.level.org.springframework.orm.jpa=ERROR

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
info.app.name=memoria-vault

memoriavault.browser.auto-open=false
memoriavault.browser.url=http://127.0.0.1:8080

memoriavault.thumbnail.max-width=480
memoriavault.thumbnail.max-height=480
memoriavault.thumbnail.video-seek-seconds=1
memoriavault.ffmpeg.path=
