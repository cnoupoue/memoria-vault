spring.datasource.url=jdbc:sqlite:${java.io.tmpdir}/memoriavault-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate=ERROR
logging.level.org.springframework.orm.jpa=ERROR

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

memoriavault.thumbnail.directory=${java.io.tmpdir}/memoriavault-test-thumbnails
memoriavault.thumbnail.max-width=480
memoriavault.thumbnail.max-height=480
memoriavault.ffmpeg.path=
memoriavault.thumbnail.video-seek-seconds=1
